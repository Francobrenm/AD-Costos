/*  CONSTANTES Y CÁLCULOS (idénticos a la versión de Claude)     */
/* ============================================================ */
const PRORRATEO = { cerrada: 1, ducto: 1, cochera: 0.5, pilas: 0.5, azotea: 0.35 };

const FIELD_LABELS = {
  cerrada: "Área Cerrada (m²)", ducto: "Área Ducto (m²)", cochera: "Cochera (m²)",
  pilas: "Pilas / Terraza (m²)", azotea: "Azotea (m²)", lote: "Área Lote (m²)",
  costoDirecto: "Costo Directo (₡)", costoIndirecto: "Costo Indirecto (₡)",
  postventa: "Postventa (₡)", precioVenta: "Precio Venta (₡)", precioLote: "Precio Lote (₡)",
};
const AREA_FIELDS = ["cerrada", "ducto", "cochera", "pilas", "azotea", "lote"];
const MONEY_FIELDS = ["costoDirecto", "costoIndirecto", "postventa", "precioVenta", "precioLote"];
const emptyForm = Object.fromEntries(["casa", "modelo", ...AREA_FIELDS, ...MONEY_FIELDS].map(k => [k, ""]));

function calcDerived(h) {
  const areaTotal = h.cerrada + h.ducto + h.cochera + h.pilas + h.azotea;
  const areaProrrateada = h.cerrada * PRORRATEO.cerrada + h.ducto * PRORRATEO.ducto +
    h.cochera * PRORRATEO.cochera + h.pilas * PRORRATEO.pilas + h.azotea * PRORRATEO.azotea;
  const ratioIndirecto = (h.precioVenta - h.precioLote) > 0 ? h.costoIndirecto / (h.precioVenta - h.precioLote) : 0;
  const costoDirectoM2 = areaTotal > 0 ? h.costoDirecto / areaTotal : 0;
  const costoTotal = h.costoDirecto + h.costoIndirecto + h.postventa + h.precioLote;
  const utilidad = h.precioVenta - costoTotal;
  const margenPct = h.precioVenta > 0 ? (utilidad / h.precioVenta) * 100 : 0;
  return { areaTotal, areaProrrateada, ratioIndirecto, costoDirectoM2, costoTotal, utilidad, margenPct };
}

const fmtMoney = (v) => new Intl.NumberFormat("es-CR", { maximumFractionDigits: 0 }).format(v || 0);
const fmtNum = (v, d = 2) => new Intl.NumberFormat("es-CR", { minimumFractionDigits: d, maximumFractionDigits: d }).format(v || 0);
const fmtPct = (v, d = 1) => `${fmtNum(v, d)}%`;
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function mapRow(row) {
  return {
    id: row.id, casa: row.casa, modelo: row.modelo,
    cerrada: Number(row.cerrada), ducto: Number(row.ducto), cochera: Number(row.cochera),
    pilas: Number(row.pilas), azotea: Number(row.azotea), lote: Number(row.lote),
    costoDirecto: Number(row.costo_directo), costoIndirecto: Number(row.costo_indirecto),
    postventa: Number(row.postventa), precioVenta: Number(row.precio_venta), precioLote: Number(row.precio_lote),
  };
}

/* ============================================================ */
/*  CARGA DE DATOS + REALTIME                                    */
/* ============================================================ */
async function loadHouses() {
  const { data, error } = await sb.from("presupuestos").select("*").order("casa", { ascending: true });
  if (!error) state.houses = (data || []).map(mapRow);
  state.loading = false;
  render();
}

sb.auth.getSession().then(({ data }) => { state.session = data.session; render(); });
sb.auth.onAuthStateChange((_event, session) => { state.session = session; render(); });

sb.channel("public:presupuestos")
  .on("postgres_changes", { event: "*", schema: "public", table: "presupuestos" }, () => loadHouses())
  .subscribe();

loadHouses();

/* ============================================================ */
/*  DERIVADOS (equivalentes a los useMemo de la versión React)   */
/* ============================================================ */
function getRowsWithStatus() {
  const rows = state.houses.map(h => ({ ...h, ...calcDerived(h) }));
  const modelStats = {};
  rows.forEach(r => {
    if (!modelStats[r.modelo]) modelStats[r.modelo] = { sum: 0, count: 0 };
    modelStats[r.modelo].sum += r.ratioIndirecto;
    modelStats[r.modelo].count += 1;
  });
  Object.keys(modelStats).forEach(m => modelStats[m].avg = modelStats[m].sum / modelStats[m].count);

  const globalAvgRatio = rows.length ? rows.reduce((a, r) => a + r.ratioIndirecto, 0) / rows.length : 0;

  const rowsWithStatus = rows.map(r => {
    const st = modelStats[r.modelo];
    let status = "neutral";
    if (st && st.count >= 2) {
      if (r.ratioIndirecto > st.avg * 1.1) status = "red";
      else if (r.ratioIndirecto > st.avg) status = "yellow";
      else status = "green";
    }
    return { ...r, status };
  });

  return { rows, rowsWithStatus, modelStats, globalAvgRatio };
}

function getModelos() {
  return Array.from(new Set(state.houses.map(h => h.modelo))).sort();
}

  if (state.activeTab === "dashboard") requestAnimationFrame(drawCharts);

      <div class="relative">

        <input type="number" step="any" id="field-${name}" value="${value}" oninput="handleFormChange('${name}', this.value)"
          class="w-full rounded-lg border ${error ? "border-red-400" : "border-slate-300"} bg-white py-2 text-sm text-slate-800 outline-none transition focus:ring-2 focus:ring-slate-200 ${prefix ? "pl-7 pr-3" : "px-3"}"
          placeholder="0.00" />

      ${error ? `<p class="mt-1 text-xs text-red-500">${esc(error)}</p>` : ""}

}

      </div>`;
  }

  const d = calcDerived({
    cerrada: parseFloat(state.form.cerrada) || 0, ducto: parseFloat(state.form.ducto) || 0,

    azotea: parseFloat(state.form.azotea) || 0, lote: parseFloat(state.form.lote) || 0,

            <datalist id="modelos-list">${modelos.map(m => `<option value="${esc(m)}">`).join("")}</datalist>

        </div>
      </div>

      <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
        <h2 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-500">Áreas (m²)</h2>
        <div class="grid grid-cols-2 gap-4 sm:grid-cols-3">
          ${AREA_FIELDS.map(f => fieldInput(f)).join("")}

        <h2 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-500">Datos Financieros</h2>

      <button type="submit" ${state.submitting ? "disabled" : ""}

        ${state.submitting ? "Guardando..." : "+ Agregar Presupuesto"}

    </form>

    <div class="lg:col-span-1">
      <div class="sticky top-6 rounded-xl border border-slate-200 bg-slate-900 p-6 text-white shadow-sm">
        <h3 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-400">Cálculo Automático</h3>
        <dl class="mono space-y-3">
          <div class="flex items-center justify-between border-b border-slate-700 pb-3">
            <dt class="text-xs text-slate-400">Área Total</dt><dd id="calc-area-total" class="text-lg font-semibold">${fmtNum(d.areaTotal)} m²</dd>
          </div>
          <div class="flex items-center justify-between border-b border-slate-700 pb-3">
            <dt class="text-xs text-slate-400">Área Prorrateada</dt><dd id="calc-area-prorrateada" class="text-lg font-semibold">${fmtNum(d.areaProrrateada)} m²</dd>
          </div>

            <dt class="text-xs text-slate-400">% de Indirectos</dt><dd id="calc-ratio" class="text-lg font-semibold">${fmtPct(d.ratioIndirecto * 100)}</dd>
          </div>

            <dt class="text-xs text-slate-400">Costo Directo / m²</dt><dd id="calc-costo-m2" class="text-lg font-semibold">₡${fmtNum(d.costoDirectoM2, 0)}</dd>

function handleFormChange(name, value) {
  state.form[name] = value;
  // Actualiza solo el panel de cálculo, sin re-renderizar todo (evita perder el foco al escribir)
  const d = calcDerived({
    cerrada: parseFloat(state.form.cerrada) || 0, ducto: parseFloat(state.form.ducto) || 0,
    cochera: parseFloat(state.form.cochera) || 0, pilas: parseFloat(state.form.pilas) || 0,
    azotea: parseFloat(state.form.azotea) || 0, lote: parseFloat(state.form.lote) || 0,
    costoDirecto: parseFloat(state.form.costoDirecto) || 0, costoIndirecto: parseFloat(state.form.costoIndirecto) || 0,
    postventa: parseFloat(state.form.postventa) || 0, precioVenta: parseFloat(state.form.precioVenta) || 0,
    precioLote: parseFloat(state.form.precioLote) || 0,
  });
  document.getElementById("calc-area-total").textContent = fmtNum(d.areaTotal) + " m²";
  document.getElementById("calc-area-prorrateada").textContent = fmtNum(d.areaProrrateada) + " m²";
  document.getElementById("calc-ratio").textContent = fmtPct(d.ratioIndirecto * 100);
  document.getElementById("calc-costo-m2").textContent = "₡" + fmtNum(d.costoDirectoM2, 0);
  const util = document.getElementById("calc-utilidad");
  util.textContent = "₡" + fmtMoney(d.utilidad);
  util.className = "text-lg font-semibold " + (d.utilidad < 0 ? "text-red-400" : "text-emerald-400");
  const margen = document.getElementById("calc-margen");
  margen.textContent = fmtPct(d.margenPct);
  margen.className = "text-lg font-semibold " + (d.margenPct < 0 ? "text-red-400" : "text-emerald-400");
}

function validateForm() {
  const errs = {};
  if (!state.form.casa.trim()) errs.casa = "El código de casa es obligatorio.";
  else if (state.houses.some(h => h.casa.toLowerCase() === state.form.casa.trim().toLowerCase())) errs.casa = "Ya existe una casa con este código.";
  if (!state.form.modelo.trim()) errs.modelo = "El modelo es obligatorio.";

  [...AREA_FIELDS, ...MONEY_FIELDS].forEach(k => {
    const raw = state.form[k];
    if (raw === "" || raw === null) { errs[k] = "Requerido."; return; }
    const v = parseFloat(raw);
    if (isNaN(v) || v < 0) errs[k] = "Debe ser un número ≥ 0.";
  });
  if (parseFloat(state.form.precioVenta) <= 0) errs.precioVenta = "El precio de venta debe ser mayor a 0.";
  if (parseFloat(state.form.costoDirecto) <= 0) errs.costoDirecto = "El costo directo debe ser mayor a 0.";

  state.errors = errs;
  return Object.keys(errs).length === 0;
}

async function handleSubmit(e) {
  e.preventDefault();
  if (!validateForm()) { render(); return; }
  state.submitting = true; render();

  const row = {
    casa: state.form.casa.trim(), modelo: state.form.modelo.trim(),
    cerrada: parseFloat(state.form.cerrada), ducto: parseFloat(state.form.ducto),
    cochera: parseFloat(state.form.cochera), pilas: parseFloat(state.form.pilas),
    azotea: parseFloat(state.form.azotea), lote: parseFloat(state.form.lote),
    costo_directo: parseFloat(state.form.costoDirecto), costo_indirecto: parseFloat(state.form.costoIndirecto),
    postventa: parseFloat(state.form.postventa), precio_venta: parseFloat(state.form.precioVenta),
    precio_lote: parseFloat(state.form.precioLote),
  };

  const { error } = await sb.from("presupuestos").insert(row);
  state.submitting = false;

  if (error) {
    state.errors = { casa: "Error al guardar: " + error.message };
    render();
    return;
  }

  state.form = { ...emptyForm };
  state.errors = {};
  state.toast = `Presupuesto para "${row.casa}" agregado correctamente.`;
  await loadHouses();
  setTimeout(() => { state.toast = null; render(); }, 3500);
}

function getModelStatus(ratioDecimal, globalAvgRatio) {
  if (!globalAvgRatio) return "neutral";
  if (ratioDecimal > globalAvgRatio * 1.1) return "red";
  if (ratioDecimal > globalAvgRatio) return "yellow";
  return "green";
}

function getModelChartData() {
  const { rowsWithStatus, globalAvgRatio } = getRowsWithStatus();
  const grouped = {};
  rowsWithStatus.forEach(r => {
    if (!grouped[r.modelo]) grouped[r.modelo] = { modelo: r.modelo, count: 0, directoSum: 0, indirectoSum: 0, utilidadSum: 0, ratioSum: 0 };
    const g = grouped[r.modelo];
    g.count++; g.directoSum += r.costoDirecto; g.indirectoSum += r.costoIndirecto; g.utilidadSum += r.utilidad; g.ratioSum += r.ratioIndirecto;
  });
  const modelChartData = Object.values(grouped).map(g => {
    const ratioAvg = g.ratioSum / g.count;
    return {
      modelo: g.modelo, count: g.count,
      DirectoProm: Math.round(g.directoSum / g.count), IndirectoProm: Math.round(g.indirectoSum / g.count),
      UtilidadProm: Math.round(g.utilidadSum / g.count), ratioPct: ratioAvg * 100,
      status: getModelStatus(ratioAvg, globalAvgRatio),
    };
  }).sort((a, b) => b.ratioPct - a.ratioPct);
  const costChartData = [...modelChartData].sort((a, b) => b.DirectoProm - a.DirectoProm);
  return { modelChartData, costChartData, globalAvgRatio };
}

function getModelAverages(rows) {
  const grouped = {};
  rows.forEach(r => {
    if (!grouped[r.modelo]) grouped[r.modelo] = { count: 0, costoDirectoSum: 0, utilidadSum: 0 };
    grouped[r.modelo].count++; grouped[r.modelo].costoDirectoSum += r.costoDirecto; grouped[r.modelo].utilidadSum += r.utilidad;
  });
  const result = {};
  Object.entries(grouped).forEach(([modelo, g]) => { result[modelo] = { avgCostoDirecto: g.costoDirectoSum / g.count, avgUtilidad: g.utilidadSum / g.count }; });
  return result;
}

function renderDashboardKpis() {
  const { rowsWithStatus, rows } = getRowsWithStatus();
  const dashboardRows = rowsWithStatus.filter(r => r.casa.toLowerCase().includes(state.dashboardSearch.toLowerCase()));

  const kpiAvgRatio = dashboardRows.length ? dashboardRows.reduce((a, r) => a + r.ratioIndirecto, 0) / dashboardRows.length : 0;
  const kpiAvgMargen = dashboardRows.length ? dashboardRows.reduce((a, r) => a + r.margenPct, 0) / dashboardRows.length : 0;

  const modelAverages = getModelAverages(rows);
  const globalAvgCostoDirecto = rows.length ? rows.reduce((a, r) => a + r.costoDirecto, 0) / rows.length : 0;
  const globalAvgUtilidad = rows.length ? rows.reduce((a, r) => a + r.utilidad, 0) / rows.length : 0;

  const comparisonRow = state.dashboardSearch.trim() && dashboardRows.length === 1 ? dashboardRows[0] : null;

  let costoComp = { value: globalAvgCostoDirecto, delta: null };
  let utilComp = { value: globalAvgUtilidad, delta: null };
  if (comparisonRow) {
    const mAvgC = modelAverages[comparisonRow.modelo]?.avgCostoDirecto ?? 0;
    const deltaC = comparisonRow.costoDirecto - mAvgC;
    costoComp = { value: mAvgC, delta: deltaC, deltaPct: mAvgC > 0 ? (deltaC / mAvgC) * 100 : 0, modelo: comparisonRow.modelo, own: comparisonRow.costoDirecto };

    const mAvgU = modelAverages[comparisonRow.modelo]?.avgUtilidad ?? 0;
    const deltaU = comparisonRow.utilidad - mAvgU;
    utilComp = { value: mAvgU, delta: deltaU, deltaPct: mAvgU !== 0 ? (deltaU / Math.abs(mAvgU)) * 100 : 0, modelo: comparisonRow.modelo, own: comparisonRow.utilidad };
  }

  const costoSub = costoComp.delta === null
    ? "Promedio general · busca una casa para comparar contra su modelo"
    : `${esc(costoComp.modelo)} · tu casa: ₡${fmtMoney(costoComp.own)} <span class="font-semibold ${costoComp.delta > 0 ? "text-red-600" : "text-emerald-600"}">(${costoComp.delta > 0 ? "+" : ""}${fmtNum(costoComp.deltaPct, 1)}%)</span>`;

  const utilSub = utilComp.delta === null
    ? "Promedio general · busca una casa para comparar contra su modelo"
    : `${esc(utilComp.modelo)} · tu casa: ₡${fmtMoney(utilComp.own)} <span class="font-semibold ${utilComp.delta >= 0 ? "text-emerald-600" : "text-red-600"}">(${utilComp.delta >= 0 ? "+" : ""}${fmtNum(utilComp.deltaPct, 1)}%)</span>`;

  return `
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
      ${kpiCard("% de Indirectos", fmtPct(kpiAvgRatio * 100), "Costo Indirecto / (Precio Venta - Precio Lote)", "#d97706", "coins")}
      ${kpiCard("Costo Directo Promedio", "₡" + fmtMoney(costoComp.value), costoSub, "#334155", "ruler")}
      ${kpiCard("Utilidad", fmtPct(kpiAvgMargen), `${dashboardRows.length} presupuesto${dashboardRows.length !== 1 ? "s" : ""} analizado${dashboardRows.length !== 1 ? "s" : ""}`, "#059669", "check")}
      ${kpiCard("Utilidad vs Promedio del Modelo", "₡" + fmtMoney(utilComp.value), utilSub, "#dc2626", "alert")}
    </div>`;
}

function renderDashboardAlerts() {
  const { rowsWithStatus, modelStats } = getRowsWithStatus();
  const alerts = rowsWithStatus
    .filter(r => r.status === "red" || r.status === "yellow")
    .filter(r => r.casa.toLowerCase().includes(state.dashboardSearch.toLowerCase()))
    .sort((a, b) => b.ratioIndirecto - a.ratioIndirecto);

  if (alerts.length === 0) return `<p class="text-sm text-slate-400">No hay presupuestos fuera de rango por el momento.</p>`;

  return `<div class="space-y-2">${alerts.map(r => {
    const avg = modelStats[r.modelo]?.avg ?? 0;
    const delta = avg > 0 ? ((r.ratioIndirecto - avg) / avg) * 100 : 0;
    return `
      <div class="flex items-center justify-between rounded-lg border px-3 py-2 text-sm ${r.status === "red" ? "border-red-200 bg-red-50" : "border-amber-200 bg-amber-50"}">
        <div>
          <p class="font-medium text-slate-800">${esc(r.casa)} <span class="text-slate-400">· ${esc(r.modelo)}</span></p>
          <p class="text-xs text-slate-500">% Indirectos ${fmtPct(r.ratioIndirecto * 100)} — ${delta >= 0 ? "+" : ""}${fmtNum(delta, 1)}% vs. promedio del modelo</p>
        </div>
        ${statusBadge(r.status)}
      </div>`;
  }).join("")}</div>`;
}

function renderModelRatioList() {
  const { modelStats } = getRowsWithStatus();
  return Object.entries(modelStats).sort((a, b) => b[1].avg - a[1].avg).map(([modelo, s]) => `
    <div class="flex items-center justify-between rounded-lg border border-slate-100 px-3 py-2 text-sm">
      <div><p class="font-medium text-slate-700">${esc(modelo)}</p><p class="text-xs text-slate-400">${s.count} presupuesto${s.count !== 1 ? "s" : ""}</p></div>
      <span class="mono font-semibold text-slate-800">${fmtPct(s.avg * 100)}</span>
    </div>`).join("");
}

function handleDashboardSearch(value) {
  state.dashboardSearch = value;
  document.getElementById("dashboard-kpis").innerHTML = renderDashboardKpis();

/* ============================================================ */
/*  GRÁFICOS (Chart.js) — siempre con TODOS los modelos          */
/* ============================================================ */
function drawCharts() {
  const { modelChartData, costChartData, globalAvgRatio } = getModelChartData();
  const statusColor = { red: "#dc2626", yellow: "#d97706", green: "#059669", neutral: "#94a3b8" };

  const sub = document.getElementById("ratio-chart-sub");
  if (sub) sub.textContent = `Línea punteada = promedio global de todos los modelos (${fmtPct(globalAvgRatio * 100)}). Muestra todos los modelos, sin filtrar por búsqueda.`;

  const costCtx = document.getElementById("chart-cost");
  if (costChartInstance) costChartInstance.destroy();
  if (costCtx) {
    costChartInstance = new Chart(costCtx, {
      type: "bar",
      data: {
        labels: costChartData.map(d => d.modelo),
        datasets: [
          { label: "Costo Directo Prom.", data: costChartData.map(d => d.DirectoProm), backgroundColor: "#475569", stack: "a" },
          { label: "Costo Indirecto Prom.", data: costChartData.map(d => d.IndirectoProm), backgroundColor: "#d97706", stack: "a" },
          { label: "Utilidad Prom.", data: costChartData.map(d => d.UtilidadProm), backgroundColor: "#059669", stack: "a" },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { stacked: true, ticks: { font: { size: 11 } } },
          y: { stacked: true, ticks: { callback: v => (v / 1e6).toFixed(0) + "M", font: { size: 11 } } },
        },
        plugins: { tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ₡${fmtMoney(ctx.raw)}` } } },
      },
    });
  }

  const ratioCtx = document.getElementById("chart-ratio");
  if (ratioChartInstance) ratioChartInstance.destroy();
  if (ratioCtx) {
    ratioChartInstance = new Chart(ratioCtx, {
      type: "bar",
      data: {
        labels: modelChartData.map(d => d.modelo),
        datasets: [{
          label: "% Indirectos",
          data: modelChartData.map(d => d.ratioPct),
          backgroundColor: modelChartData.map(d => statusColor[d.status]),
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { ticks: { font: { size: 11 } } },
          y: { ticks: { callback: v => v.toFixed(0) + "%", font: { size: 11 } } },
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => `% Indirectos: ${fmtPct(ctx.raw)}` } },
          annotationLine: true,
        },
      },
      plugins: [{
        id: "avgLine",
        afterDraw(chart) {
          const { ctx, chartArea, scales } = chart;
          const y = scales.y.getPixelForValue(globalAvgRatio * 100);
          ctx.save();
          ctx.setLineDash([5, 5]);
          ctx.strokeStyle = "#1e293b";
          ctx.beginPath();
          ctx.moveTo(chartArea.left, y);
          ctx.lineTo(chartArea.right, y);
          ctx.stroke();
          ctx.restore();
        },
      }],
    });
  }
}

function openLogin() { state.showLogin = true; state.loginError = ""; render(); }
function closeLogin() { state.showLogin = false; render(); }

function renderLoginModal() {
  return `

    <div class="w-full max-w-sm rounded-xl bg-white p-6 shadow-xl">
      <h3 class="mb-4 text-lg font-semibold text-slate-800">Iniciar sesión</h3>
      <div class="space-y-3">
        <input type="email" id="login-email" placeholder="Correo" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-200" />
        <input type="password" id="login-password" placeholder="Contraseña" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-200" />
        ${state.loginError ? `<p class="text-xs text-red-500">${esc(state.loginError)}</p>` : ""}
        <div class="flex gap-2 pt-2">
          <button onclick="handleLogin()" ${state.loginBusy ? "disabled" : ""} class="flex-1 rounded-lg bg-amber-600 px-4 py-2 text-sm font-semibold text-white hover:bg-amber-700 disabled:opacity-60">${state.loginBusy ? "Ingresando..." : "Ingresar"}</button>
          <button onclick="closeLogin()" class="flex-1 rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`;
}

async function handleLogin() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  state.loginBusy = true; render();
  const { error } = await sb.auth.signInWithPassword({ email, password });
  state.loginBusy = false;
  if (error) { state.loginError = "Correo o contraseña incorrectos."; render(); return; }
  state.showLogin = false;
  render();
}

async function handleLogout() {
  await sb.auth.signOut();
  render();
}
