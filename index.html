const PRORRATEO = { cerrada: 1, ducto: 1, cochera: 0.5, pilas: 0.5, azotea: 0.35 };

// Valores de ajuste por m² para el estimador de costo directo (fijos)
const AJUSTE_CERRADA = 310000;   // ₡/m² de diferencia en área cerrada

  postventa: "Postventa (₡)", precioVenta: "Precio Venta (₡)", precioLote: "Precio Lote (₡)",
};
const AREA_FIELDS = ["cerrada", "ducto", "cochera", "pilas", "azotea", "lote"];
const MONEY_FIELDS = ["costoDirecto", "costoIndirecto", "postventa", "precioVenta", "precioLote"];

function calcDerived(h) {
  const areaTotal = h.cerrada + h.ducto + h.cochera + h.pilas + h.azotea;
  const areaProrrateada = h.cerrada * PRORRATEO.cerrada + h.ducto * PRORRATEO.ducto +
    h.cochera * PRORRATEO.cochera + h.pilas * PRORRATEO.pilas + h.azotea * PRORRATEO.azotea;
  const ratioIndirecto = (h.precioVenta - h.precioLote) > 0 ? h.costoIndirecto / (h.precioVenta - h.precioLote) : 0;
  const costoDirectoM2 = areaTotal > 0 ? h.costoDirecto / areaTotal : 0;
  const costoTotal = h.costoDirecto + h.costoIndirecto + h.postventa + h.precioLote;
  const utilidad = h.precioVenta - costoTotal;
  const margenPct = h.precioVenta > 0 ? (utilidad / h.precioVenta) * 100 : 0;
  return { areaTotal, areaProrrateada, ratioIndirecto, costoDirectoM2, costoTotal, utilidad, margenPct };
}

const fmtMoney = (v) => new Intl.NumberFormat("es-CR", { maximumFractionDigits: 0 }).format(v || 0);
const fmtNum = (v, d = 2) => new Intl.NumberFormat("es-CR", { minimumFractionDigits: d, maximumFractionDigits: d }).format(v || 0);
const fmtPct = (v, d = 1) => `${fmtNum(v, d)}%`;
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

// Evalúa de forma segura expresiones como "2+3.5" o "(10*2)+1.25" escritas en los campos.
// Solo permite dígitos, + - * / ( ) y puntos decimales; cualquier otro caracter invalida el cálculo.
function safeEvalMath(expr) {
  if (typeof expr !== "string") return NaN;
  const trimmed = expr.trim();
  if (trimmed === "") return NaN;
  if (!/^[0-9+\-*/().\s]+$/.test(trimmed)) return NaN;
  try {
    const result = Function('"use strict"; return (' + trimmed + ")")();
    return typeof result === "number" && isFinite(result) ? result : NaN;
  } catch (e) {
    return NaN;
  }
}

}

  state.loading = false;
  render();

async function loadBase() {

    id: b.id, modelo: b.modelo, tipo: b.tipo,

    precio_venta: Number(b.precio_venta),
  }));
  render();
}

/* ============================================================ */
/*  DERIVADOS (equivalentes a los useMemo de la versión React)   */
/* ============================================================ */
function getRowsWithStatus() {
  const rows = state.houses.map(h => ({ ...h, ...calcDerived(h) }));
  const modelStats = {};
  rows.forEach(r => {
    if (!modelStats[r.modelo]) modelStats[r.modelo] = { sum: 0, count: 0 };
    modelStats[r.modelo].sum += r.ratioIndirecto;
    modelStats[r.modelo].count += 1;
  });
  Object.keys(modelStats).forEach(m => modelStats[m].avg = modelStats[m].sum / modelStats[m].count);

  const globalAvgRatio = rows.length ? rows.reduce((a, r) => a + r.ratioIndirecto, 0) / rows.length : 0;

  const rowsWithStatus = rows.map(r => {
    const st = modelStats[r.modelo];
    let status = "neutral";
    if (st && st.count >= 2) {
      if (r.ratioIndirecto > st.avg * 1.1) status = "red";
      else if (r.ratioIndirecto > st.avg) status = "yellow";
      else status = "green";
    }
    return { ...r, status };
  });

  return { rows, rowsWithStatus, modelStats, globalAvgRatio };
}

function getModelos() {
  return Array.from(new Set(state.houses.map(h => h.modelo))).sort();

function handleFormChange(name, value) {
  state.form[name] = value;

  // El switch de tipo de presupuesto necesita re-render para verse activo
  if (name === "tipoPresupuesto") { render(); return; }

  // Postventa se autocalcula como 2% del costo directo
  if (name === "costoDirecto") {
    const cd = safeEvalMath(value);
    state.form.postventa = isNaN(cd) ? "" : String(Math.round(cd * 0.02));
    const pvEl = document.getElementById("field-postventa");
    if (pvEl) pvEl.value = state.form.postventa;
  }

  // Si el campo es de área o financiero, muestra el resultado calculado debajo (ej. "2+3.5" -> "= 5.50")
  const resultEl = document.getElementById(`field-${name}-result`);
  if (resultEl) {
    const evaluated = safeEvalMath(value);
    const isExpression = /[+\-*/()]/.test(value || "") && !isNaN(evaluated);
    resultEl.style.display = isExpression ? "" : "none";
    resultEl.textContent = isExpression ? "= " + fmtNum(evaluated) : "";
  }

  // Actualiza solo el panel de cálculo, sin re-renderizar todo (evita perder el foco al escribir)
  const d = calcDerived({
    cerrada: safeEvalMath(state.form.cerrada) || 0, ducto: safeEvalMath(state.form.ducto) || 0,
    cochera: safeEvalMath(state.form.cochera) || 0, pilas: safeEvalMath(state.form.pilas) || 0,
    azotea: safeEvalMath(state.form.azotea) || 0, lote: safeEvalMath(state.form.lote) || 0,
    costoDirecto: safeEvalMath(state.form.costoDirecto) || 0, costoIndirecto: safeEvalMath(state.form.costoIndirecto) || 0,
    postventa: safeEvalMath(state.form.postventa) || 0, precioVenta: safeEvalMath(state.form.precioVenta) || 0,
    precioLote: safeEvalMath(state.form.precioLote) || 0,
  });
  document.getElementById("calc-area-total").textContent = fmtNum(d.areaTotal) + " m²";
  document.getElementById("calc-area-prorrateada").textContent = fmtNum(d.areaProrrateada) + " m²";
  document.getElementById("calc-ratio").textContent = fmtPct(d.ratioIndirecto * 100);
  document.getElementById("calc-costo-m2").textContent = "₡" + fmtNum(d.costoDirectoM2, 0);
  const util = document.getElementById("calc-utilidad");
  util.textContent = "₡" + fmtMoney(d.utilidad);
  util.className = "text-lg font-semibold " + (d.utilidad < 0 ? "text-red-400" : "text-emerald-400");
  const margen = document.getElementById("calc-margen");
  margen.textContent = fmtPct(d.margenPct);
  margen.className = "text-lg font-semibold " + (d.margenPct < 0 ? "text-red-400" : "text-emerald-400");
}

function validateForm() {
  const errs = {};
  if (!state.form.casa.trim()) errs.casa = "El código de casa es obligatorio.";
  else if (state.houses.some(h => h.casa.toLowerCase() === state.form.casa.trim().toLowerCase())) errs.casa = "Ya existe una casa con este código.";
  if (!state.form.modelo.trim()) errs.modelo = "El modelo es obligatorio.";

  [...AREA_FIELDS, ...MONEY_FIELDS].forEach(k => {
    const raw = state.form[k];
    if (raw === "" || raw === null) { errs[k] = "Requerido."; return; }
    const v = safeEvalMath(raw);
    if (isNaN(v) || v < 0) errs[k] = "Debe ser un número (o una operación como 2+3) ≥ 0.";
  });
  if (safeEvalMath(state.form.precioVenta) <= 0) errs.precioVenta = "El precio de venta debe ser mayor a 0.";
  if (safeEvalMath(state.form.costoDirecto) <= 0) errs.costoDirecto = "El costo directo debe ser mayor a 0.";

  state.errors = errs;
  return Object.keys(errs).length === 0;
}

async function handleSubmit(e) {
  e.preventDefault();
  if (!validateForm()) { render(); return; }
  state.submitting = true; render();

  const row = {
    casa: state.form.casa.trim(), modelo: state.form.modelo.trim(),
    tipo_presupuesto: state.form.tipoPresupuesto || "detallado",
    cerrada: safeEvalMath(state.form.cerrada), ducto: safeEvalMath(state.form.ducto),
    cochera: safeEvalMath(state.form.cochera), pilas: safeEvalMath(state.form.pilas),
    azotea: safeEvalMath(state.form.azotea), lote: safeEvalMath(state.form.lote),
    costo_directo: safeEvalMath(state.form.costoDirecto), costo_indirecto: safeEvalMath(state.form.costoIndirecto),
    postventa: safeEvalMath(state.form.postventa), precio_venta: safeEvalMath(state.form.precioVenta),
    precio_lote: safeEvalMath(state.form.precioLote),
  };

  const { error } = await sb.from("presupuestos").insert(row);
  state.submitting = false;

  if (error) {
    state.errors = { casa: "Error al guardar: " + error.message };
    render();
    return;
  }

  state.form = { ...emptyForm };
  state.errors = {};
  state.toast = `Presupuesto para "${row.casa}" agregado correctamente.`;
  await loadHouses();
  setTimeout(() => { state.toast = null; render(); }, 3500);
}

function getModelStatus(ratioDecimal, globalAvgRatio) {
  if (!globalAvgRatio) return "neutral";
  if (ratioDecimal > globalAvgRatio * 1.1) return "red";
  if (ratioDecimal > globalAvgRatio) return "yellow";
  return "green";
}

function getModelChartData() {
  const { rowsWithStatus, globalAvgRatio } = getRowsWithStatus();
  const grouped = {};
  rowsWithStatus.forEach(r => {
    const key = r.modelo + "||" + r.tipoPresupuesto;
    if (!grouped[key]) grouped[key] = { modelo: r.modelo, tipo: r.tipoPresupuesto, count: 0, directoSum: 0, indirectoSum: 0, utilidadSum: 0, ratioSum: 0 };
    const g = grouped[key];
    g.count++; g.directoSum += r.costoDirecto; g.indirectoSum += r.costoIndirecto; g.utilidadSum += r.utilidad; g.ratioSum += r.ratioIndirecto;
  });
  const modelChartData = Object.values(grouped).map(g => {
    const ratioAvg = g.ratioSum / g.count;
    const suf = g.tipo === "rapido" ? " (R)" : " (D)";
    return {
      modelo: g.modelo, tipo: g.tipo, count: g.count,
      etiqueta: g.modelo + suf,
      DirectoProm: Math.round(g.directoSum / g.count), IndirectoProm: Math.round(g.indirectoSum / g.count),
      UtilidadProm: Math.round(g.utilidadSum / g.count), ratioPct: ratioAvg * 100,
      status: getModelStatus(ratioAvg, globalAvgRatio),
    };
  });
  // Ordenar por modelo y, dentro del modelo, Detallado antes que Rápido
  const costChartData = [...modelChartData].sort((a, b) =>
    b.DirectoProm - a.DirectoProm
  );
  return { modelChartData, costChartData, globalAvgRatio };
}

function getModelAverages(rows) {
  const grouped = {};
  rows.forEach(r => {
    if (!grouped[r.modelo]) grouped[r.modelo] = { count: 0, costoDirectoSum: 0, costoIndirectoSum: 0, utilidadSum: 0 };
    grouped[r.modelo].count++;
    grouped[r.modelo].costoDirectoSum += r.costoDirecto;
    grouped[r.modelo].costoIndirectoSum += r.costoIndirecto;
    grouped[r.modelo].utilidadSum += r.utilidad;
  });
  const result = {};
  Object.entries(grouped).forEach(([modelo, g]) => {
    result[modelo] = {
      avgCostoDirecto: g.costoDirectoSum / g.count,
      avgCostoIndirecto: g.costoIndirectoSum / g.count,
      avgUtilidad: g.utilidadSum / g.count,
    };
  });
  return result;
}

function renderTipoComparacion() {
  const { rows } = getRowsWithStatus();
  const grupos = {
    detallado: rows.filter(r => r.tipoPresupuesto === "detallado"),
    rapido: rows.filter(r => r.tipoPresupuesto === "rapido"),
  };

  function stats(arr) {
    if (!arr.length) return null;
    const n = arr.length;
    return {
      n,
      costoDirecto: arr.reduce((a, r) => a + r.costoDirecto, 0) / n,
      costoIndirecto: arr.reduce((a, r) => a + r.costoIndirecto, 0) / n,
      ratio: arr.reduce((a, r) => a + r.ratioIndirecto, 0) / n,
      utilidad: arr.reduce((a, r) => a + r.utilidad, 0) / n,
      margen: arr.reduce((a, r) => a + r.margenPct, 0) / n,
    };
  }
  const d = stats(grupos.detallado);
  const r = stats(grupos.rapido);

  const cell = (v, fmt) => v === null ? '<span class="text-slate-300">—</span>' : fmt(v);
  const row = (label, key, fmt) => `
    <tr class="border-b border-slate-100 last:border-0">
      <td class="px-4 py-2.5 text-slate-600" style="font-family:'Inter',sans-serif;">${label}</td>
      <td class="px-4 py-2.5 text-right mono">${cell(d ? d[key] : null, fmt)}</td>
      <td class="px-4 py-2.5 text-right mono">${cell(r ? r[key] : null, fmt)}</td>
      <td class="px-4 py-2.5 text-right mono ${d && r ? (r[key] - d[key] >= 0 ? "text-emerald-600" : "text-red-600") : ""}">${d && r ? ((r[key] - d[key] >= 0 ? "+" : "") + fmt(r[key] - d[key])) : '<span class="text-slate-300">—</span>'}</td>
    </tr>`;

  return `
  <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h3 class="mb-1 text-sm font-semibold text-slate-700">Comparación Detallado vs Rápido</h3>
    <p class="mb-4 text-xs text-slate-400">Promedios de cada tipo de presupuesto sobre todo el consolidado. La última columna es la diferencia (Rápido − Detallado).</p>
    <div class="overflow-x-auto">
      <table class="w-full min-w-[640px] text-left text-sm">
        <thead>
          <tr class="border-b border-slate-200 bg-slate-50 text-xs uppercase tracking-wide text-slate-500">
            <th class="px-4 py-3 font-semibold">Métrica (promedio)</th>
            <th class="px-4 py-3 text-right font-semibold">Detallado ${d ? `(${d.n})` : "(0)"}</th>
            <th class="px-4 py-3 text-right font-semibold">Rápido ${r ? `(${r.n})` : "(0)"}</th>
            <th class="px-4 py-3 text-right font-semibold">Diferencia</th>
          </tr>
        </thead>
        <tbody>
          ${row("Costo Directo", "costoDirecto", v => "₡" + fmtMoney(v))}
          ${row("Costo Indirecto", "costoIndirecto", v => "₡" + fmtMoney(v))}
          ${row("% de Indirectos", "ratio", v => fmtPct(v * 100))}
          ${row("Utilidad", "utilidad", v => "₡" + fmtMoney(v))}
          ${row("Margen", "margen", v => fmtPct(v))}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderDashboardKpis() {
  const { rowsWithStatus, rows } = getRowsWithStatus();
  const dashboardRows = rowsWithStatus
    .filter(r => state.dashboardTipo === "Todos" || r.tipoPresupuesto === state.dashboardTipo)
    .filter(r => r.casa.toLowerCase().includes(state.dashboardSearch.toLowerCase()));

  const kpiAvgRatio = dashboardRows.length ? dashboardRows.reduce((a, r) => a + r.ratioIndirecto, 0) / dashboardRows.length : 0;
  const kpiAvgMargen = dashboardRows.length ? dashboardRows.reduce((a, r) => a + r.margenPct, 0) / dashboardRows.length : 0;

  const modelAverages = getModelAverages(rows);
  const globalAvgCostoDirecto = rows.length ? rows.reduce((a, r) => a + r.costoDirecto, 0) / rows.length : 0;
  const globalAvgCostoIndirecto = rows.length ? rows.reduce((a, r) => a + r.costoIndirecto, 0) / rows.length : 0;
  const globalAvgUtilidad = rows.length ? rows.reduce((a, r) => a + r.utilidad, 0) / rows.length : 0;

  const comparisonRow = state.dashboardSearch.trim() && dashboardRows.length === 1 ? dashboardRows[0] : null;

  let costoComp = { value: globalAvgCostoDirecto, delta: null };
  let indirectoComp = { value: globalAvgCostoIndirecto, delta: null };
  let utilComp = { value: globalAvgUtilidad, delta: null };
  if (comparisonRow) {
    const mAvgC = modelAverages[comparisonRow.modelo]?.avgCostoDirecto ?? 0;
    const deltaC = comparisonRow.costoDirecto - mAvgC;
    costoComp = { value: mAvgC, delta: deltaC, deltaPct: mAvgC > 0 ? (deltaC / mAvgC) * 100 : 0, modelo: comparisonRow.modelo, own: comparisonRow.costoDirecto };

    const mAvgI = modelAverages[comparisonRow.modelo]?.avgCostoIndirecto ?? 0;
    const deltaI = comparisonRow.costoIndirecto - mAvgI;
    indirectoComp = { value: mAvgI, delta: deltaI, deltaPct: mAvgI > 0 ? (deltaI / mAvgI) * 100 : 0, modelo: comparisonRow.modelo, own: comparisonRow.costoIndirecto };

    const mAvgU = modelAverages[comparisonRow.modelo]?.avgUtilidad ?? 0;
    const deltaU = comparisonRow.utilidad - mAvgU;
    utilComp = { value: mAvgU, delta: deltaU, deltaPct: mAvgU !== 0 ? (deltaU / Math.abs(mAvgU)) * 100 : 0, modelo: comparisonRow.modelo, own: comparisonRow.utilidad };
  }

  const costoSub = costoComp.delta === null
    ? "Promedio general · busca una casa para comparar contra su modelo"
    : `${esc(costoComp.modelo)} · tu casa: ₡${fmtMoney(costoComp.own)} <span class="font-semibold ${costoComp.delta > 0 ? "text-red-600" : "text-emerald-600"}">(${costoComp.delta > 0 ? "+" : ""}${fmtNum(costoComp.deltaPct, 1)}%)</span>`;

  const indirectoSub = indirectoComp.delta === null
    ? "Promedio general · busca una casa para comparar contra su modelo"
    : `${esc(indirectoComp.modelo)} · tu casa: ₡${fmtMoney(indirectoComp.own)} <span class="font-semibold ${indirectoComp.delta > 0 ? "text-red-600" : "text-emerald-600"}">(${indirectoComp.delta > 0 ? "+" : ""}${fmtNum(indirectoComp.deltaPct, 1)}%)</span>`;

  const utilSub = utilComp.delta === null
    ? "Promedio general · busca una casa para comparar contra su modelo"
    : `${esc(utilComp.modelo)} · tu casa: ₡${fmtMoney(utilComp.own)} <span class="font-semibold ${utilComp.delta >= 0 ? "text-emerald-600" : "text-red-600"}">(${utilComp.delta >= 0 ? "+" : ""}${fmtNum(utilComp.deltaPct, 1)}%)</span>`;

  return `
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-5">
      ${kpiCard("Costo Directo Promedio", "₡" + fmtMoney(costoComp.value), costoSub, "#334155")}
      ${kpiCard("% de Indirectos", fmtPct(kpiAvgRatio * 100), "Costo Indirecto / (Precio Venta - Precio Lote)", "#d97706")}
      ${kpiCard("Costo Indirecto Promedio", "₡" + fmtMoney(indirectoComp.value), indirectoSub, "#b45309")}
      ${kpiCard("Utilidad %", fmtPct(kpiAvgMargen), `${dashboardRows.length} presupuesto${dashboardRows.length !== 1 ? "s" : ""} analizado${dashboardRows.length !== 1 ? "s" : ""}`, "#059669")}
      ${kpiCard("Utilidad vs Promedio del Modelo", "₡" + fmtMoney(utilComp.value), utilSub, "#dc2626")}
    </div>`;
}

function renderDashboardAlerts() {
  const { rowsWithStatus, modelStats } = getRowsWithStatus();
  const alerts = rowsWithStatus
    .filter(r => r.status === "red" || r.status === "yellow")
    .filter(r => r.casa.toLowerCase().includes(state.dashboardSearch.toLowerCase()))
    .sort((a, b) => b.ratioIndirecto - a.ratioIndirecto);

  if (alerts.length === 0) return `<p class="text-sm text-slate-400">No hay presupuestos fuera de rango por el momento.</p>`;

  return `<div class="space-y-2">${alerts.map(r => {

    return `

// Familias base únicas (nombre de modelo) para el selector
function getBaseFamilias() {
  return Array.from(new Set(state.baseList.map(b => b.modelo))).sort((a, b) => a.localeCompare(b, "es"));
}

// Dado la familia elegida, devuelve las bases de esa familia
// ordenadas de mayor a menor por área cerrada.
function getBaseSugerencias() {
  if (!state.estFamilia) return [];
  const candidatos = state.baseList.filter(b => b.modelo === state.estFamilia);
  return [...candidatos].sort((a, b) => b.const_cerrada - a.const_cerrada);
}

// Calcula el costo directo estimado a partir de una base seleccionada y las áreas objetivo.
// El tercer piso (oficina) se suma al área cerrada para efectos del ajuste de ₡310,000/m².
function calcEstimacion(base) {
  const cerradaObj = (safeEvalMath(state.estCerrada) || 0) + (safeEvalMath(state.estTercerPiso) || 0);
  const cocheraObj = safeEvalMath(state.estCochera) || 0;
  const pilasObj = safeEvalMath(state.estPilas) || 0;

  const cerradaBase = base.const_cerrada + base.tercer_piso;
  const difCerrada = cerradaObj - cerradaBase;
  const extObj = cocheraObj + pilasObj;
  const extBase = base.cochera + base.pila_terraza;
  const difExterior = extObj - extBase;

  const ajusteCerrada = difCerrada * AJUSTE_CERRADA;
  const ajusteExterior = difExterior * AJUSTE_EXTERIOR;
  const costoDirectoEstimado = base.costo_directo + ajusteCerrada + ajusteExterior;

  return { difCerrada, difExterior, extObj, extBase, cerradaObj, cerradaBase, ajusteCerrada, ajusteExterior, costoDirectoEstimado };
}

      </div>
      <div class="flex items-center justify-between border-b border-slate-300 pb-3">
        <dt class="text-xs text-slate-500">Costo Indirecto (base)</dt>
        <dd class="text-sm">₡${fmtMoney(base.costo_indirecto)}</dd>
      </div>
    </dl>
    <button onclick="handleUsarEstimacion()" class="mt-5 w-full rounded-lg px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition" style="background:#6b7a45" onmouseover="this.style.background='#5c6a39'" onmouseout="this.style.background='#6b7a45'">
      Usar en Formulario de Entrada
    </button>
    <p class="mt-2 text-xs leading-relaxed text-slate-500">Precarga el Costo Directo estimado y el Costo Indirecto de la base en el formulario. Podrás ajustar todo antes de guardar.</p>`;
}

function handleEstFamilia(value) {
  state.estFamilia = value;
  state.estSelectedBaseId = null;
  render();
}

function handleEstInput(field, value) {
  state[field] = value;

  // Preview de la operación bajo el campo (igual que en el formulario)
  const idMap = { estCerrada: "est-cerrada", estTercerPiso: "est-tercerpiso", estCochera: "est-cochera", estPilas: "est-pilas" };
  const resultEl = document.getElementById(`${idMap[field]}-result`);
  if (resultEl) {
    const evaluated = safeEvalMath(value);
    const isExpression = /[+\-*/()]/.test(value || "") && !isNaN(evaluated);
    resultEl.style.display = isExpression ? "" : "none";
    resultEl.textContent = isExpression ? "= " + fmtNum(evaluated) : "";
  }

  // Si hay una base seleccionada, refrescamos solo el detalle de estimación (sin re-render completo, para no perder el foco)
  if (state.estSelectedBaseId) {
    const base = state.baseList.find(b => b.id === state.estSelectedBaseId);
    const cont = document.getElementById("est-detalle");
    if (base && cont) cont.innerHTML = renderEstimacionDetalle(base);
  }
}

function handleSelectBase(id) {
  state.estSelectedBaseId = id;
  render();
}

function handleUsarEstimacion() {
  const base = state.baseList.find(b => b.id === state.estSelectedBaseId);
  if (!base) return;
  const e = calcEstimacion(base);
  // Precargamos el formulario con lo que tenemos.
  // El modelo se deja vacío a propósito: la familia base (ej. "ZANTE 5.50 M") solo sirvió
  // para el match; en el formulario el modelo se escribe como se maneja en la app (ej. "Tebas Azotea").
  state.form = { ...emptyForm };
  state.form.tipoPresupuesto = "rapido";
  state.form.cerrada = String(safeEvalMath(state.estCerrada) || "");
  state.form.cochera = String(safeEvalMath(state.estCochera) || "");
  state.form.pilas = String(safeEvalMath(state.estPilas) || "");
  state.form.costoDirecto = String(Math.round(e.costoDirectoEstimado));
  state.form.costoIndirecto = String(Math.round(base.costo_indirecto));
  state.form.postventa = String(Math.round(e.costoDirectoEstimado * 0.02));
  state.activeTab = "formulario";
  state.toast = "Estimación cargada en el formulario. Revisa y completa los demás campos antes de guardar.";
  render();
  setTimeout(() => { state.toast = null; render(); }, 5000);
}

/* ============================================================ */
/*  AUTENTICACIÓN                                                */
/* ============================================================ */
function openLogin() { state.showLogin = true; state.loginError = ""; render(); }
function closeLogin() { state.showLogin = false; render(); }

function renderLoginModal() {
  return `
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
    <div class="w-full max-w-sm rounded-xl bg-white p-6 shadow-xl">
      <h3 class="mb-4 text-lg font-semibold text-slate-800">Iniciar sesión</h3>
      <div class="space-y-3">
        <input type="email" id="login-email" placeholder="Correo" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-200" />
        <input type="password" id="login-password" placeholder="Contraseña" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-slate-200" />
        ${state.loginError ? `<p class="text-xs text-red-500">${esc(state.loginError)}</p>` : ""}
        <div class="flex gap-2 pt-2">
          <button onclick="handleLogin()" ${state.loginBusy ? "disabled" : ""} class="flex-1 rounded-lg bg-amber-600 px-4 py-2 text-sm font-semibold text-white hover:bg-amber-700 disabled:opacity-60">${state.loginBusy ? "Ingresando..." : "Ingresar"}</button>
          <button onclick="closeLogin()" class="flex-1 rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">Cancelar</button>
        </div>
      </div>
    </div>
  </div>`;
}

async function handleLogin() {
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  state.loginBusy = true; render();
  const { error } = await sb.auth.signInWithPassword({ email, password });
  state.loginBusy = false;
  if (error) { state.loginError = "Correo o contraseña incorrectos."; render(); return; }
  state.showLogin = false;
  state.entered = true;
  render();
}

async function handleLogout() {
  await sb.auth.signOut();
  render();
}
</script>
</body>
</html>
